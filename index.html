<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HiAnime | Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #ffdd95; --bg: #0f0f0f; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; }
        /* Hide sidebar on small screens */
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0 !important; } }
        .anime-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 12px; }
        .video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="flex overflow-x-hidden">

    <aside class="sidebar w-64 bg-black h-screen sticky top-0 hidden md:flex flex-col border-r border-white/10">
        <div class="p-6 text-2xl font-bold text-[#ffdd95]">HiAnime</div>
        <nav class="flex flex-col gap-4 px-4">
            <a href="#" class="p-3 hover:bg-white/10 rounded"><i class="fa fa-home mr-3"></i> Home</a>
            <a href="#" class="p-3 text-[#ffdd95]"><i class="fa fa-fire mr-3"></i> Trending</a>
        </nav>
    </aside>

    <main class="main-content flex-1 min-w-0">
        <header class="p-4 flex items-center gap-4 sticky top-0 bg-[#0f0f0f]/90 backdrop-blur z-50">
            <div class="md:hidden text-[#ffdd95] text-xl"><i class="fa fa-bars"></i></div>
            <div class="relative flex-1">
                <i class="fa fa-search absolute left-3 top-3 text-gray-500"></i>
                <input type="text" placeholder="Search..." class="w-full bg-[#222] py-2 px-10 rounded-full outline-none border border-transparent focus:border-[#ffdd95]">
            </div>
            <div class="w-8 h-8 bg-[#ffdd95] rounded-full"></div>
        </header>

        <section class="p-4">
            <div class="video-container shadow-2xl">
                <video controls poster="https://artworks.thetvdb.com/artworks/posters/series/267440/backgrounds/620c345380536.jpg">
                    <source src="YOUR_LICENSED_LINK_HERE.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <h1 class="text-xl font-bold mt-4">Attack on Titan - Episode 01</h1>
            <p class="text-sm text-gray-400">To You, in 2000 Years</p>
        </section>

        <section class="p-4">
            <h3 class="text-[#ffdd95] font-bold mb-4 border-l-4 border-[#ffdd95] pl-3">Recommended for You</h3>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                
                <div class="anime-card">
                    <div class="relative aspect-[2/3]">
                        <img src="https://cdn.pixabay.com/photo/2022/12/01/04/40/anime-7628292_1280.jpg" class="w-full h-full object-cover">
                        <div class="absolute bottom-2 left-2 bg-black/70 text-[10px] px-2 py-0.5 rounded">SUB | DUB</div>
                    </div>
                    <div class="p-2">
                        <p class="text-xs font-bold truncate">Jujutsu Kaisen</p>
                    </div>
                </div>

                <div class="anime-card">
                    <div class="relative aspect-[2/3]">
                        <img src="https://cdn.pixabay.com/photo/2023/05/25/11/53/tokyo-8017006_1280.jpg" class="w-full h-full object-cover">
                        <div class="absolute bottom-2 left-2 bg-black/70 text-[10px] px-2 py-0.5 rounded">SUB | DUB</div>
                    </div>
                    <div class="p-2">
                        <p class="text-xs font-bold truncate">Tokyo Revengers</p>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <div class="md:hidden fixed bottom-0 w-full bg-black border-t border-white/10 flex justify-around py-3 z-50">
        <i class="fa fa-home text-[#ffdd95]"></i>
        <i class="fa fa-compass text-gray-500"></i>
        <i class="fa fa-bookmark text-gray-500"></i>
        <i class="fa fa-user text-gray-500"></i>
    </div>

</body>
</html>
