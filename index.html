
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel
        :root { --accent: #ffdd95; --bg: #121212; --panel: #1f1f1f; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: ct-cover">
            <div class="absolute inset-0 bg-gradient-to-r from-[#121212] via-[#121212]/60 to-transparent">
                <div class="p-12 mt-20 max-w-2xl">
                    <h2 class="text-white text-7xl font-black mb-4 italic">ATTACK ON TITAN</h2>
                    <div class="flex gap-4 mb-4 text-sm font-bold">
                        <span class="text-[#ffdd95]"><i class="fa fa-star"></i> 9.8</span>
                        <span>Final Season</span>
                        <span class="bg-white/20 px-2 rounded">Japanese / English</span>
                    </div>
                    <p class="text-gray-300 text-lg mb-8">The world's most watched anime. Experience the epic conclusion of the battle between humans and titans.</p>
                    <button onclick="playAnime()" class="watch-btn px-10 py-4 rounded-full font-black flex items-center gap-3">
                        <i class="fa fa-play"></i> WATCH EPISODE 1
                    </button>
                </div>
            </div>
        </section>

        <section id="player-section" class="hidden p-8">
            <div class="bg-black rounded-xl overflow-hidden shadow-2xl border border-white/10">
                <video id="my-video" class="video-js vjs-big-play-centered w-full h-[600px]" controls preload="auto">
                    <source src="YOUR_VIDEO_URL_HERE.mp4" type="video/mp4" />
                </video>
            </div>
            <h2 class="text-2xl font-bold mt-6">Attack on Titan - Episode 01: To You, in 2000 Years</h2>
        </section>

        <section class="p-8">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <span class="w-1 h-6 bg-[#ffdd95] rounded"></span> Recommended for You
            </h3>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <div class="group cursor-pointer">
                    <div class="relative overflow-hidden rounded-lg aspect-[2/3]">
                        <img src="https://m.media-amazon.com/images/I/81S6U2TccJL._AC_UF894,1000_QL80_.jpg" class="h-full w-full object-cover group-hover:scale-110 transition duration-500">
                        <div class="absolute bottom-2 left-2 bg-black/80 px-2 py-1 text-[10px] rounded">SUB | DUB</div>
                    </div>
                    <h4 class="mt-3 font-semibold group-hover:text-[#ffdd95]">Jujutsu Kaisen</h4>
                </div>
                </div>
        </section>

    </main>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        function playAnime() {
            document.getElementById('hero').classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
